services:
  - type: web
    name: verida-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build --workspace=@verida/shared && npm run build --workspace=@verida/api
    startCommand: cd apps/api && node dist/index.js
    preStartCommand: cd apps/api && npx drizzle-kit push --config=../../drizzle.config.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: verida-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: verida-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SHELBY_API_KEY
        sync: false
      - key: SHELBY_SIGNER_PRIVATE_KEY
        sync: false
      - key: SHELBY_NETWORK
        value: testnet
    healthCheckPath: /healthz
    autoDeploy: true
