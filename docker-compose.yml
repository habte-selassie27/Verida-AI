services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verida-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://verida:localpass@postgres:5432/verida_ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      SHELBY_API_KEY: ${SHELBY_API_KEY:-}
      SHELBY_SIGNER_PRIVATE_KEY: ${SHELBY_SIGNER_PRIVATE_KEY:-}
      SHELBY_NETWORK: ${SHELBY_NETWORK:-testnet}
    ports:
      - '4000:4000'

  postgres:
    image: postgres:16
    container_name: verida-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: verida_ai
      POSTGRES_USER: verida
      POSTGRES_PASSWORD: localpass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U verida -d verida_ai']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: verida-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: verida-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - '8080:8080'

volumes:
  postgres_data:
  redis_data:
